  <style>
    @keyframes pop-up {
      0% { transform: translateY(0) scale(0.5); opacity: 0; }
      10% { opacity: 1; transform: translateY(-10vh) scale(1); }
      80% { opacity: 1; transform: translateY(-80vh) scale(1.2) rotate(15deg); }
      100% { transform: translateY(-100vh) scale(1.5) rotate(-15deg); opacity: 0; }
    }
    .animate-celebration {
      animation: pop-up linear forwards;
    }
    .slide-in {
      animation: slide-in-up 0.3s ease-out forwards;
    }
    @keyframes slide-in-up {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #10b981;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>

    const rawCSV = `行,頭文字,読みテキスト,場所・関連地域,緯度,経度

    const placesData = rawCSV.trim().split('\n').slice(1).map((line, index) => {
      const cols = line.split(',');
      return {
        id: `place-${index}`,
        row: cols[0],
        kana: cols[1],
        text: cols[2],
        place: cols[3],
        lat: parseFloat(cols[4]),
        lng: parseFloat(cols[5])
      };
    });

    const state = {
      user: null,
      visitedPlaces: {},
      searchQuery: '',
      selectedPlace: null,
      db: null,
      isSaving: false,
      isConfirmingDelete: false

    const clearSearchBtn = document.getElementById('clear-search');

    const animationRoot = document.getElementById('animation-root');

    const headerTotalPlacesEl = document.getElementById('header-total-places');
    const headerProgressBar = document.getElementById('header-progress-bar');

    document.getElementById('icon-search').innerHTML = icons.search;
    document.getElementById('icon-x-search').innerHTML = icons.x;
    document.getElementById('icon-mappin-title').innerHTML = icons.mapPin;
    document.getElementById('icon-list').innerHTML = icons.list;

    totalPlacesEl.textContent = placesData.length;
    headerTotalPlacesEl.textContent = placesData.length;

    let map = null;
    const markers = {};

    window.gm_authFailure = function () {
      const mapContainer = document.getElementById("map-container");
      if (mapContainer) {
        mapContainer.innerHTML = `<div class="flex items-center justify-center h-full bg-white p-6 text-center text-gray-500">Google Mapsの認証エラー。GCPの設定を確認してください。</div>`;
      }
    };

    window.initMap = function () {
      map = new google.maps.Map(document.getElementById("map-container"), {
        center: { lat: 36.02, lng: 139.4 },
        zoom: 9,
        mapTypeControl: false,
        streetViewControl: false,
        styles: [{ featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] }]
      });

      placesData.forEach(place => {
        const marker = new google.maps.Marker({
          position: { lat: place.lat, lng: place.lng },
          map: map,
          title: place.text,
        });
        marker.addListener('click', () => {
          state.selectedPlace = place;
          state.isConfirmingDelete = false;
          renderModal();
        });
        markers[place.id] = marker;
      });
      updateMarkers();
    };

    function updateMarkers() {
      if (!map) return;
      placesData.forEach(place => {
        const marker = markers[place.id];
        if (marker) {
          const isVisited = !!state.visitedPlaces[place.id];
          marker.setIcon(isVisited ? 'https://maps.google.com/mapfiles/ms/icons/orange-dot.png' : 'https://maps.google.com/mapfiles/ms/icons/green-dot.png');
        }
      });
    }

    function loadGoogleMaps() {
      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&callback=initMap`;
      script.async = true;
      script.defer = true;
      document.head.appendChild(script);
    }

    // --- Firebase初期化とエラー修正 ---
    async function initFirebase() {
      try {
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        state.db = getFirestore(app);
        
        const initAuth = async () => {
          // トークンの不一致 (auth/custom-token-mismatch) を回避するための try-catch
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (tokenError) {
            // トークンが不一致（外部環境）の場合は匿名ログインにフォールバック
            await signInAnonymously(auth);
          }
        };
        await initAuth();

        onAuthStateChanged(auth, (user) => {
          state.user = user;
          if (user) {
            setupFirestoreListener();
          }
          renderAll();
        });
      } catch (error) {
        console.error("Firebase Init Error:", error);
        state.user = { uid: 'local' };
        renderAll();
      }
    }

    let unsubscribeSnapshot = null;
    function setupFirestoreListener() {
      if (!state.user || !state.db) return;
      const visitsRef = collection(state.db, 'artifacts', appId, 'public', 'data', 'family_visits');
      
      if (unsubscribeSnapshot) unsubscribeSnapshot();
      
      unsubscribeSnapshot = onSnapshot(visitsRef, (snapshot) => {
        const visits = {};
        snapshot.forEach(doc => { visits[doc.id] = doc.data(); });
        state.visitedPlaces = visits;
        renderAll();
      }, (error) => {
        console.error("Firestore Listen Error:", error);
      });
    }

const resizeImage = (file) => {
      return new Promise((resolve, reject) => {
        try {
          const reader = new FileReader();
          reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              // サイズを600pxに抑えて保存容量エラーを防止
              const MAX_WIDTH = 600;
              let scaleSize = 1;
              if (img.width > MAX_WIDTH) {
                scaleSize = MAX_WIDTH / img.width;
              }
              canvas.width = img.width * scaleSize;
              canvas.height = img.height * scaleSize;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              // 品質を0.6に下げてデータサイズをさらに圧縮
              resolve(canvas.toDataURL('image/jpeg', 0.6));
            };
            img.onerror = (e) => reject(e);
            img.src = event.target.result;
          };
          reader.onerror = (e) => reject(e);
          reader.readAsDataURL(file);
        } catch (err) {
          reject(err);
        }
      });
    };
    async function saveVisit(placeId, comment, finalPhoto) {
      if (!state.db || !state.user) return;
      state.isSaving = true;
      renderModal();

      try {
        const placeRef = doc(state.db, 'artifacts', appId, 'public', 'data', 'family_visits', placeId);
        const isNewVisit = !state.visitedPlaces[placeId];

        await setDoc(placeRef, {
          visited: true,
          comment: comment || '',
          photo: finalPhoto || state.visitedPlaces[placeId]?.photo || '',
          timestamp: serverTimestamp(),
          userId: state.user.uid
        }, { merge: true });

        if (isNewVisit) triggerAnimation();
        state.selectedPlace = null;
　　　　 } catch (error) {
        console.error("Save error:", error);
        alert("保存に失敗しました。写真のサイズが大きい可能性があります。"); // ← 追加
      } finally {
        state.isSaving = false;
        renderAll();
      }
    }

    async function executeDelete(placeId) {
      if (!state.db) return;
      state.isSaving = true;
      renderModal();

      try {
        const placeRef = doc(state.db, 'artifacts', appId, 'public', 'data', 'family_visits', placeId);
        await deleteDoc(placeRef);
        state.isConfirmingDelete = false;
        state.selectedPlace = null;
      } catch (error) {
        console.error("Delete error:", error);
      } finally {
        state.isSaving = false;
        renderAll();
      }
    }

    function renderAll() {
      const filteredPlaces = getFilteredPlaces();
      const totalVisited = Object.keys(state.visitedPlaces).length;
      totalVisitedEl.textContent = totalVisited;
      headerTotalVisitedEl.textContent = totalVisited;
      const progressPercentage = Math.round((totalVisited / placesData.length) * 100) || 0;
      progressBar.style.width = `${progressPercentage}%`;
      headerProgressBar.style.width = `${progressPercentage}%`;
      renderList(filteredPlaces);
      renderModal();
      updateMarkers();
    }

    function getFilteredPlaces() {
      if (!state.searchQuery) return placesData;
      const q = state.searchQuery.toLowerCase();
      return placesData.filter(p => p.kana.includes(q) || p.text.includes(q) || p.place.includes(q));
    }

    function renderList(filteredPlaces) {
      listCountEl.textContent = filteredPlaces.length;
      if (filteredPlaces.length === 0) {
        listContainer.innerHTML = `<p class="text-gray-500 text-center py-8 col-span-full">見つかりませんでした</p>`;
        return;
      }
      listContainer.innerHTML = filteredPlaces.map(place => {
        const visit = state.visitedPlaces[place.id];
        const isVisited = !!visit;
        const thumbnailHtml = hasPhoto ? `
          <div class="w-12 h-12 rounded-full overflow-hidden mr-4 shrink-0 shadow-sm border-2 border-orange-200">
            <img src="${visit.photo}" class="w-full h-full object-cover" alt="写真">
          </div>
        ` : `
          <div class="w-12 h-12 rounded-full flex items-center justify-center font-bold text-xl mr-4 shrink-0 shadow-sm ${iconClass}">${place.kana}</div>
        `;

        return `
          <div data-id="${place.id}" class="place-btn p-4 rounded-xl border-2 cursor-pointer transition-all flex items-center active:scale-[0.98] ${containerClass}">
            ${thumbnailHtml}
            <div class="flex-1 min-w-0 pr-2">
              <p class="font-bold text-gray-800 text-sm mb-1">${place.text}</p>
              <p class="text-xs text-gray-500 truncate flex items-center"><span class="mr-1 w-3 h-3">${icons.mapPin}</span>${place.place}</p>
            </div>
            ${isVisited ? `<div class="shrink-0 text-orange-500 ml-1 w-6 h-6">${icons.checkCircle}</div>` : ''}
          </div>`;
      }).join('');
    }

    function renderModal() {
      if (!state.selectedPlace) { modalRoot.innerHTML = ''; return; }
      const place = state.selectedPlace;
      const visit = state.visitedPlaces[place.id] || {};
      const isVisited = !!visit.visited;

      modalRoot.innerHTML = `
        <div class="fixed inset-0 z-40 flex items-end sm:items-center justify-center bg-black/60 backdrop-blur-sm p-0 sm:p-4 close-modal-bg transition-opacity">
          <div class="bg-white w-full sm:max-w-md rounded-t-3xl sm:rounded-3xl p-6 pb-10 sm:pb-6 shadow-2xl slide-in max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6 sm:hidden"></div>
            <div class="flex justify-between items-start mb-4">
              <div class="w-16 h-16 bg-green-100 text-green-700 rounded-full flex items-center justify-center text-3xl font-bold shrink-0 shadow-inner">${place.kana}</div>
              <button class="close-modal-btn p-2 bg-gray-100 rounded-full text-gray-400 hover:text-gray-600 ml-4 shrink-0">${icons.x}</button>
            </div>
            <h3 class="text-xl sm:text-2xl font-bold text-gray-800 mb-2 leading-relaxed">${place.text}</h3>
            <p class="text-gray-500 text-sm mb-6 flex items-center"><span class="mr-1 w-3 h-3">${icons.mapPin}</span>${place.place}</p>
            <div class="space-y-4">
              <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1">感想・メモ</label>
                <textarea id="comment-input" rows="3" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-green-500 outline-none transition-all" placeholder="思い出を残しましょう...">${visit.comment || ''}</textarea>
              </div>
              <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1">写真</label>
                <div class="flex items-center gap-3">
                  <label class="cursor-pointer bg-green-50 text-green-600 px-4 py-2 rounded-xl text-sm font-bold border border-green-200 hover:bg-green-100 transition-all flex items-center">
                    <span class="mr-2">${icons.camera}</span> 写真を選ぶ
                    <input type="file" id="photo-input" accept="image/*" class="hidden">
                  </label>
                </div>
                <div id="photo-preview-container" data-removed="false" class="mt-3 relative ${visit.photo ? '' : 'hidden'}">
                  <img id="photo-preview" src="${visit.photo || ''}" class="w-full h-48 object-cover rounded-xl border border-gray-100">
                  <button id="remove-photo-btn" class="absolute top-2 right-2 bg-black/50 text-white p-1.5 rounded-full hover:bg-black/70 transition-all">${icons.trash}</button>
                </div>
              </div>
              <button id="save-btn" class="w-full py-4 rounded-2xl font-bold text-lg flex items-center justify-center transition-all active:scale-[0.98] ${state.isSaving ? 'bg-gray-200 text-gray-400' : 'bg-gradient-to-r from-orange-400 to-orange-500 text-white shadow-lg shadow-orange-500/30'}" ${state.isSaving ? 'disabled' : ''}>
                ${state.isSaving ? '<div class="loader mr-2"></div> 保存中...' : (isVisited ? '記録を更新する' : 'この場所に行った！')}
              </button>
              ${isVisited ? `
                <div id="delete-container" class="border-t border-gray-100 pt-3 text-center">
                  ${state.isConfirmingDelete ? `
                    <div class="bg-red-50 p-4 rounded-2xl border border-red-100">
                      <p class="text-red-700 text-xs font-bold mb-3">本当に訪問記録を消去しますか？</p>
                      <div class="flex gap-2">
                        <button id="cancel-delete-btn" class="flex-1 py-3 bg-white text-gray-500 rounded-xl text-sm font-bold border border-gray-200">やめる</button>
                        <button id="confirm-delete-btn" class="flex-1 py-3 bg-red-500 text-white rounded-xl text-sm font-bold">消去する</button>
                      </div>
                    </div>
                  ` : `<button id="show-delete-confirm-btn" class="text-red-400 text-sm font-bold flex items-center justify-center mx-auto opacity-70 hover:opacity-100"><span class="mr-1">${icons.trash}</span> 訪問記録を消去する</button>`}
                </div>
              ` : ''}
            </div>
          </div>
        </div>`;
    }

    function triggerAnimation() {
      animationRoot.innerHTML = '';
      const emojis = ['🌟', '✨', '🎉', '🎊', '🎈', '👏'];
      for (let i = 0; i < 40; i++) {
        const el = document.createElement('div');
        el.className = 'absolute animate-celebration drop-shadow-lg';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = `${Math.random() * 100}vw`;
        el.style.bottom = '-50px';
        el.style.fontSize = `${Math.random() * 1.5 + 1}rem`;
        el.style.animationDuration = `${Math.random() * 2 + 1.5}s`;
        el.style.animationDelay = `${Math.random() * 0.5}s`;
        animationRoot.appendChild(el);
      }
      setTimeout(() => { animationRoot.innerHTML = ''; }, 4000);
    }

    // --- イベント ---
    searchInput.addEventListener('input', (e) => {
      state.searchQuery = e.target.value;
      clearSearchBtn.classList.toggle('hidden', !state.searchQuery);
      renderAll();
    });

    clearSearchBtn.addEventListener('click', () => {
      state.searchQuery = '';
      searchInput.value = '';
      clearSearchBtn.classList.add('hidden');
      renderAll();
    });

    document.body.addEventListener('click', async (e) => {
      const placeBtn = e.target.closest('.place-btn');
      if (placeBtn) {
        state.selectedPlace = placesData.find(p => p.id === placeBtn.dataset.id);
        state.isConfirmingDelete = false;
        renderModal();
        return;
      }
      if (e.target.closest('.close-modal-btn') || (e.target.closest('.close-modal-bg') && e.target === e.target.closest('.close-modal-bg'))) {
        state.selectedPlace = null;
        renderModal();
        return;
      }
      if (e.target.id === 'photo-input') return;
if (e.target.closest('#save-btn')) {
        const comment = document.getElementById('comment-input')?.value;
        const container = document.getElementById('photo-preview-container');
        const preview = document.getElementById('photo-preview');
        
        let finalPhoto = state.visitedPlaces[state.selectedPlace.id]?.photo || '';
        
        if (container?.dataset.removed === 'true') {
          finalPhoto = '';
        } else if (preview && preview.src && preview.src.startsWith('data:')) {
          finalPhoto = preview.src;
        }
        
        saveVisit(state.selectedPlace.id, comment, finalPhoto);
        return;
      }
      if (e.target.closest('#show-delete-confirm-btn')) {
        state.isConfirmingDelete = true;
        renderModal();
        return;
      }
      if (e.target.closest('#cancel-delete-btn')) {
        state.isConfirmingDelete = false;
        renderModal();
        return;
      }
      if (e.target.closest('#confirm-delete-btn')) {
        executeDelete(state.selectedPlace.id);
        return;
      }
// ★写真削除処理
      if (e.target.closest('#remove-photo-btn')) {
        const container = document.getElementById('photo-preview-container');
        if (container) {
          container.classList.add('hidden');
          container.dataset.removed = 'true';
        }
        const preview = document.getElementById('photo-preview');
        if (preview) preview.src = '';
        const input = document.getElementById('photo-input');
        if (input) input.value = '';
      }
    });

document.body.addEventListener('change', async (e) => {
      if (e.target.id === 'photo-input') {
        const file = e.target.files[0];
        if (file) {
          try {
            const base64 = await resizeImage(file);
            const preview = document.getElementById('photo-preview');
            const container = document.getElementById('photo-preview-container');
            
            if (preview && container) {
              preview.src = base64;
              container.classList.remove('hidden');
              container.dataset.removed = 'false'; // 削除フラグをリセット
            }
          } catch (error) {
            console.error("Image processing error:", error);
            alert("写真の処理に失敗しました。別の写真をお試しください。");
          }
        }
      }
    });

    initFirebase();
    loadGoogleMaps();
  </script>
</body>
