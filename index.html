<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow"> <!-- 検索エンジンに載らないようにする設定 -->
  <title>家族の埼玉かるた探訪マップ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pop-up {
      0% { transform: translateY(0) scale(0.5); opacity: 0; }
      10% { opacity: 1; transform: translateY(-10vh) scale(1); }
      80% { opacity: 1; transform: translateY(-80vh) scale(1.2) rotate(15deg); }
      100% { transform: translateY(-100vh) scale(1.5) rotate(-15deg); opacity: 0; }
    }
    .animate-celebration {
      animation: pop-up linear forwards;
    }
    .slide-in {
      animation: slide-in-up 0.3s ease-out forwards;
    }
    @keyframes slide-in-up {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    /* スクロールバーの非表示設定 */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-[#F0FDF4] text-gray-800 font-sans pb-24 selection:bg-green-200">

  <!-- ヘッダー -->
  <header class="bg-white sticky top-0 z-30 shadow-sm border-b border-green-100">
    <div class="max-w-3xl mx-auto px-4 py-3">
      <div class="flex justify-between items-center mb-3">
        <h1 class="text-lg sm:text-xl font-bold text-green-700 flex items-center">

        <div class="text-sm font-bold text-green-600 flex items-center bg-green-50 px-3 py-1 rounded-full shadow-inner border border-green-100">

          <span id="header-total-visited" class="text-lg">0</span>
          <span class="text-gray-400 text-xs ml-1">/ <span id="header-total-places">0</span></span>

      </div>
      
      <div class="relative mb-3">

      </div>
    </div>
  </header>

  <!-- Firebase & アプリケーションロジック -->
  <script type="module">

    // ★★★ Google Maps APIキーの設定 ★★★
    const GOOGLE_MAPS_API_KEY = "AIzaSyDrAtwrrKDve0v9s96OZ5eeXXiaW7uYqFU"; // ※実際に使う際は、以前のAPIキーを設定してください

    // --- SVGアイコン定義 ---

      mapPin: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,

      checkCircle: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,

    };

    // --- データ定義 ---
    const rawCSV = `行,頭文字,読みテキスト,場所・関連地域,マップ登録,緯度,経度
あ行,あ,あさつゆに ぬれてかがやく こだいはす,行田市（古代蓮の里）,FALSE,36.126526,139.485125
あ行,い,いざしゅつじん たいへいめざし なおざねこう,熊谷市（熊谷直実ゆかりの地）,FALSE,36.145300,139.385500
あ行,う,うちゅうまで ゆめをとどけた わかたこういち,さいたま市（さいたま市青少年宇宙科学館）,FALSE,35.867400,139.673800

か行,け,けやきのき せみもこかげの なつやすみ,埼玉県全域（県の木）,FALSE,35.856900,139.648800
か行,こ,こふんぐん むさしのごうぞく ねむるはか,行田市（さきたま古墳群）,TRUE,36.124800,139.479500
さ行,さ,さくらそう かれんにやさしく けんのはな,さいたま市（田島ヶ原）,FALSE,35.842700,139.608300
さ行,し,しょかつつじ あきはもみじの りょうかみさん,小鹿野町・秩父市（両神山）,FALSE,36.014200,138.835400
さ行,す,すみきった そらにむかって りゅうのまい,秩父市吉田（龍勢祭り/椋神社）,FALSE,36.055600,139.027400
さ行,せ,せいりゅうに いきながらえよ むさしとみよ,熊谷市（ムサシトミヨ保護センター）,FALSE,36.145500,139.390500

た行,ち,ちょうみんが かぶきやくしゃの おがのまち,小鹿野町（小鹿野歌舞伎）,FALSE,36.012300,139.006900
た行,つ,つうせんぼり えどまでむすぶ かわのみち,さいたま市緑区（見沼通船堀）,FALSE,35.870300,139.711800
た行,て,でんとうの ささらししまい うけつぐこ,県内各地（熊野神社など・獅子舞）,FALSE,35.971486,138.975722
た行,と,とおいたび みちすじかたる とねのみず,利根川流域（加須市など）,FALSE,36.128800,139.598200
な行,な,なつのよる はちがたじょうに さくはなび,寄居町（鉢形城跡）,FALSE,36.115800,139.197900
な行,に,にらめっこ ぶしゅうだるまの めをいれて,越谷市（越谷だるま）,FALSE,35.890600,139.791000
な行,ぬ,ぬくもりが ふじからあふれる たましきじんじゃ,加須市（玉敷神社）,FALSE,36.103200,139.570100
な行,ね,ねむりから さめたおにばす きたかわべ,加須市（北川辺・オニバス）,FALSE,36.177200,139.664400
な行,の,のうみんの くるしみのかたち ちちぶじけん,秩父市（秩父事件）,FALSE,35.996200,139.083200
は行,は,はんぎにて れきしをきざみ なをのこす,本庄市児玉（塙保己一記念館）,FALSE,36.191200,139.135200
は行,ひ,ひゃくあなの しぜんのほうこ ひかりごけ,吉見町（吉見百穴・ヒカリゴケ）,FALSE,36.038400,139.421600
は行,ふ,ふるさとの さくらのめいしょ ごんげんどう,幸手市（権現堂桜堤）,FALSE,36.088600,139.726200
は行,へ,べーごまは いもののふるさと かわぐちさん,川口市（鋳物・ベーゴマ）,FALSE,35.801600,139.717000
は行,ほ,ほいっする ひびけこころの すたじあむ,さいたま市（埼玉スタジアム2002など）,FALSE,35.903100,139.716200
ま行,ま,まが玉は かことみらいの くびかざり,行田市（さきたま古墳群・勾玉）,FALSE,36.124900,139.479600
ま行,み,みぬまのた れきしをうつし そらかつぐ,さいたま市など（見沼田んぼ）,FALSE,35.885800,139.673700
ま行,む,むさしのの おもかげのこる へいりんじ,新座市（平林寺）,FALSE,35.795400,139.554000
ま行,め,めろでぃに ふるさとのせて しもふさかんいち,加須市（下総皖一）,FALSE,36.134400,139.596700
ま行,も,もりのなか ととろをさがす だいぼうけん,所沢市（狭山丘陵・トトロの森）,FALSE,35.767500,139.414700
や行,や,やぶさめで やをいるこらの むしゃすがた,毛呂山町（出雲伊波比神社など）,FALSE,35.943100,139.313800
や行,ゆ,ゆめのもり えがおあふれる みゅーずぱーく,秩父市・小鹿野町（秩父ミューズパーク）,FALSE,35.986300,139.060200
や行,よ,よめにいく むすめにおやから きりたんす,春日部市（桐たんす）,FALSE,35.980600,139.752300
ら行,ら,らかんさま どこかにている ともだちに,川越市（喜多院・五百羅漢）,FALSE,35.918400,139.489100
ら行,り,りんぎょうに いのちささげた ほんだせいろく,久喜市（本多静六）,FALSE,36.066400,139.667700
ら行,る,るーぷきょう かりさかこえて もものさと,秩父市（雁坂トンネル・ループ橋）,FALSE,35.892600,138.834000
ら行,れ,れんめんと さいばらかぐら ひびきあり,久喜市（鷲宮神社・催馬楽神楽）,FALSE,36.097000,139.658200
ら行,ろ,ろーむそう あかつちふきあげ かぜにまう,本庄、櫛引、江南、東松山、入間など,FALSE,36.237200,139.184800
わ行,わ,わそうのび いまにつたえる ひなにんぎょう,鴻巣市など（ひな人形）,FALSE,36.059400,139.510000
わ行,を,じょいいちごう みらいをひらいた おぎのぎんこ,熊谷市妻沼（荻野吟子記念館）,FALSE,36.225900,139.373400
わ行,ん,しんぼるは さいたまありーな しんとしん,さいたま市（さいたまスーパーアリーナ）,FALSE,35.894300,139.630800`;

    // CSV文字列を配列に変換し、緯度・経度を取得
    const placesData = rawCSV.trim().split('\n').slice(1).map((line, index) => {
      const cols = line.split(',');
      return {
        id: `place-${index}`,
        row: cols[0],
        kana: cols[1],
        text: cols[2],
        place: cols[3],
        isMapped: cols[4] === 'TRUE',
        lat: parseFloat(cols[5]),
        lng: parseFloat(cols[6])
      };
    });

    // --- アプリケーションの状態 ---
    const state = {
      user: null,
      visitedPlaces: {},
      searchQuery: '',
      selectedPlace: null,
      db: null,
      geminiResult: null, // AIの回答結果
      isGeminiLoading: false // AI通信中のフラグ
    };

    // --- DOM要素取得 ---
    const searchInput = document.getElementById('search-input');
    const clearSearchBtn = document.getElementById('clear-search');
    const totalVisitedEl = document.getElementById('total-visited');
    const totalPlacesEl = document.getElementById('total-places');
    const progressBar = document.getElementById('progress-bar');
    const listContainer = document.getElementById('list-container');
    const listCountEl = document.getElementById('list-count');
    const modalRoot = document.getElementById('modal-root');
    const animationRoot = document.getElementById('animation-root');
    
    // ヘッダー用の要素取得
    const headerTotalVisitedEl = document.getElementById('header-total-visited');
    const headerTotalPlacesEl = document.getElementById('header-total-places');
    const headerProgressBar = document.getElementById('header-progress-bar');

    // --- 初期アイコン描画 ---
    document.getElementById('icon-compass-header').innerHTML = icons.compass;
    document.getElementById('icon-star-header').innerHTML = icons.star;
    document.getElementById('icon-search').innerHTML = icons.search;
    document.getElementById('icon-x-search').innerHTML = icons.x;
    document.getElementById('icon-star').innerHTML = icons.star;
    document.getElementById('icon-mappin-title').innerHTML = icons.mapPin;
    document.getElementById('icon-list').innerHTML = icons.list;

    totalPlacesEl.textContent = placesData.length;
    headerTotalPlacesEl.textContent = placesData.length;


    // ★★★ Google Maps APIの描画・制御ロジック ★★★
    let map = null;
    const markers = {}; // idをキーにしてマーカーを保存

    // Google Maps APIエラーハンドリング（RefererNotAllowedMapErrorなどの対応）
    window.gm_authFailure = function() {
      const mapContainer = document.getElementById("map-container");
      if(mapContainer) {
        const origin = window.location.origin;
        mapContainer.innerHTML = `
          <div class="flex flex-col items-center justify-center h-full bg-white p-6 text-center text-gray-500 overflow-y-auto">
            <span class="text-4xl mb-3">⚠️</span>
            <p class="font-bold mb-2 text-gray-700">マップの認証エラー</p>
            <p class="text-xs text-left bg-gray-50 p-3 rounded border border-gray-200">
              GCPコンソールでAPIキーの「ウェブサイトの制限」に現在のURLが追加されていません。<br><br>
              以下のURLをコピーして、GCPの許可リスト（HTTPリファラー）に追加してください：<br><br>
              <code class="font-bold text-red-500 break-all select-all block bg-red-50 p-2 rounded mt-1 mb-2">${origin}/*</code>
              <br>
              ※設定が反映されるまで数分かかる場合があります。設定後、ページをリロードしてください。
            </p>
          </div>
        `;
      }
    };

    window.initMap = function() {
      const mapContainer = document.getElementById("map-container");
      
      map = new google.maps.Map(mapContainer, {
        center: { lat: 36.02, lng: 139.4 },
        zoom: 9,
        mapTypeControl: false,
        streetViewControl: false,
        styles: [
          { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] }
        ]
      });

      placesData.forEach(place => {
        if (!place.lat || !place.lng) return;
        
        const marker = new google.maps.Marker({
          position: { lat: place.lat, lng: place.lng },
          map: map,
          title: place.text,
        });

        marker.addListener('click', () => {
          state.selectedPlace = place;
          state.geminiResult = null; // AI結果のリセット
          state.isGeminiLoading = false;
          renderModal();
        });

        markers[place.id] = marker;
      });

      updateMarkers();
    };

    function updateMarkers() {
      if (!map) return;
      
      placesData.forEach(place => {
        const marker = markers[place.id];
        if (marker) {
          const isVisited = !!state.visitedPlaces[place.id];
          const iconUrl = isVisited 
            ? 'https://maps.google.com/mapfiles/ms/icons/orange-dot.png'
            : 'https://maps.google.com/mapfiles/ms/icons/green-dot.png';
          marker.setIcon(iconUrl);
        }
      });
    }

    function loadGoogleMaps() {
      if (GOOGLE_MAPS_API_KEY === "AIzaSyDrAtwrrKDve0v9s96OZ5eeXXiaW7uYqFU") {
        document.getElementById("map-container").innerHTML = `
          <div class="flex flex-col items-center justify-center h-full bg-white p-6 text-center text-gray-500">
            <span class="text-4xl mb-3">🗺️</span>
            <p class="font-bold mb-1 text-gray-700">Google Maps APIキーが未設定です</p>
            <p class="text-xs">コードの153行目付近にある <code>GOOGLE_MAPS_API_KEY</code> に、取得したAPIキーを設定してください。</p>
          </div>
        `;
        return;
      }
      
      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&callback=initMap`;
      script.async = true;
      script.defer = true;
      document.head.appendChild(script);
    }


    // --- Firebase 初期化処理 ---
    async function initFirebase() {
      if (typeof __firebase_config === 'undefined') {
        console.log("Firebase is not configured. Running in local mode.");
        state.user = { uid: 'local-user' };
        renderAll();
        return;
      }

      try {
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        state.db = getFirestore(app);

        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }

        onAuthStateChanged(auth, (user) => {
          state.user = user || { uid: 'local-user' };
          setupFirestoreListener();
          renderAll();
        });
      } catch (error) {
        console.error("Firebase init error:", error);
        state.user = { uid: 'local-user' };
        renderAll();
      }
    }

    // --- Firestore リスナー ---
    let unsubscribeSnapshot = null;
    function setupFirestoreListener() {
      if (!state.user || state.user.uid === 'local-user' || !state.db) return;
      
      const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
      const visitsRef = collection(state.db, 'artifacts', appId, 'public', 'data', 'family_visits');
      
      if (unsubscribeSnapshot) unsubscribeSnapshot();
      
      unsubscribeSnapshot = onSnapshot(visitsRef, (snapshot) => {
        const visits = {};
        snapshot.forEach(doc => {
          visits[doc.id] = doc.data();
        });
        state.visitedPlaces = visits;
        renderAll(); 
      }, (error) => {
        console.error("Fetch error:", error);
      });
    }

    // --- Gemini API 呼び出しロジック ---
    async function askGemini(type, place) {
      // 処理中状態にする
      state.isGeminiLoading = true;
      state.geminiResult = null;
      renderModal();

      let prompt = "";
      if (type === "trivia") {
        prompt = `埼玉かるたの読み札「${place.text}」に関連する場所「${place.place}」について、子供でも興味を持てるような面白い豆知識や歴史的背景を3〜4文程度で教えてください。`;
      } else if (type === "diary") {
        prompt = `「${place.place}」（かるた：${place.text}）に家族で行ってきました！という内容で、SNS（InstagramやXなど）に投稿できるような、絵文字たっぷりの楽しくて短い感想文のドラフトを1つ作成してください。`;
      }

      // Gemini APIのキー（環境から自動的に提供されます）
      const geminiApiKey = "AIzaSyB-3rnYDrJG5D3Tiaj7GGyPJ3F5Mz8fmVc"; 
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiApiKey}`;
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: "あなたは埼玉県の魅力を楽しく伝える親しみやすいローカルガイドAIです。" }] }
      };

      let retries = 5;
      let delay = 1000;
      let resultText = "通信エラーが発生しました。";

      while (retries > 0) {
        try {
          const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          if (!response.ok) throw new Error("API Error");
          const result = await response.json();
          resultText = result.candidates?.[0]?.content?.parts?.[0]?.text || "結果がうまく取得できませんでした。";
          break;
        } catch (e) {
          retries--;
          if (retries === 0) break;
          await new Promise(r => setTimeout(r, delay));
          delay *= 2;
        }
      }

      // 結果を保存して再描画
      state.geminiResult = resultText;
      state.isGeminiLoading = false;
      renderModal();
    }


    // --- 状態更新とFirestore書き込み ---
    async function toggleVisit(placeId) {
      const isCurrentlyVisited = !!state.visitedPlaces[placeId];
      
      if (isCurrentlyVisited) {
        delete state.visitedPlaces[placeId];
      } else {
        state.visitedPlaces[placeId] = { visited: true, timestamp: new Date(), recordedBy: state.user?.uid || 'local' };
        triggerAnimation();
        
        // モーダルを自動で閉じる処理は、Geminiの結果を見たいユーザーのために無効化するか、少し長く待つ。
        // 今回は、AIの機能を使うかもしれないので自動クローズは無効化します。
      }
      renderAll();

      if (state.user && state.user.uid !== 'local-user' && state.db) {
        try {
          const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
          const placeRef = doc(state.db, 'artifacts', appId, 'public', 'data', 'family_visits', placeId);

          if (isCurrentlyVisited) {
            await deleteDoc(placeRef);
          } else {
            await setDoc(placeRef, { 
              visited: true, 
              timestamp: serverTimestamp(),
              recordedBy: state.user.uid
            });
          }
        } catch (error) {
          console.error("Update error:", error);
        }
      }
    }

    // --- 描画ロジック ---
    function renderAll() {
      const filteredPlaces = getFilteredPlaces();
      
      const totalVisited = Object.keys(state.visitedPlaces).length;
      totalVisitedEl.textContent = totalVisited;
      headerTotalVisitedEl.textContent = totalVisited;
      
      const progressPercentage = Math.round((totalVisited / placesData.length) * 100) || 0;
      progressBar.style.width = `${progressPercentage}%`;
      headerProgressBar.style.width = `${progressPercentage}%`;

      renderList(filteredPlaces);
      renderModal();
      updateMarkers();
    }

    function getFilteredPlaces() {
      if (!state.searchQuery) return placesData;
      const q = state.searchQuery.toLowerCase();
      return placesData.filter(p => 
        p.kana.includes(q) || p.text.includes(q) || p.place.includes(q)
      );
    }

    function renderList(filteredPlaces) {
      listCountEl.textContent = filteredPlaces.length;
      
      if (filteredPlaces.length === 0) {
        listContainer.innerHTML = `<p class="text-gray-500 text-center py-8 col-span-full">見つかりませんでした</p>`;
        return;
      }

      listContainer.innerHTML = filteredPlaces.map(place => {
        const isVisited = !!state.visitedPlaces[place.id];
        const containerClass = isVisited ? 'border-orange-300 bg-orange-50 shadow-sm' : 'border-white bg-white shadow hover:border-green-200';
        const iconClass = isVisited ? 'bg-orange-500 text-white' : 'bg-green-100 text-green-700';
        
        return `
          <div data-id="${place.id}" class="place-btn p-4 rounded-xl border-2 cursor-pointer transition-all flex items-center active:scale-[0.98] ${containerClass}">
            <div class="w-12 h-12 rounded-full flex items-center justify-center font-bold text-xl mr-4 shrink-0 shadow-sm ${iconClass}">
              ${place.kana}
            </div>
            <div class="flex-1 min-w-0 pr-2">
              <p class="font-bold text-gray-800 text-sm mb-1">${place.text}</p>
              <p class="text-xs text-gray-500 truncate flex items-center">
                <span class="mr-1 w-3 h-3">${icons.mapPin}</span>
                ${place.place}
              </p>
            </div>
            ${isVisited ? `<div class="shrink-0 text-orange-500 ml-1 w-6 h-6">${icons.checkCircle}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    function renderModal() {
      if (!state.selectedPlace) {
        modalRoot.innerHTML = '';
        return;
      }

      const place = state.selectedPlace;
      const isVisited = !!state.visitedPlaces[place.id];
      const btnClass = isVisited 
        ? 'bg-white text-orange-600 border-2 border-orange-500 shadow-sm' 
        : 'bg-gradient-to-r from-orange-400 to-orange-500 text-white shadow-lg shadow-orange-500/30 hover:from-orange-500 hover:to-orange-600';

      // Gemini機能のUI部分を生成
      const geminiUI = `
        <div class="mt-6 border-t border-gray-100 pt-5">
          <div class="flex flex-col gap-3">
            <button class="ask-gemini-trivia bg-gradient-to-r from-purple-50 to-purple-100 text-purple-700 hover:from-purple-100 hover:to-purple-200 px-4 py-3 rounded-xl text-sm font-bold shadow-sm transition-all flex items-center justify-center active:scale-95">
              <span class="text-purple-500 mr-2">${icons.sparkles}</span> この場所の豆知識を聞く
            </button>
            ${isVisited ? `
            <button class="ask-gemini-diary bg-gradient-to-r from-blue-50 to-cyan-100 text-blue-700 hover:from-blue-100 hover:to-cyan-200 px-4 py-3 rounded-xl text-sm font-bold shadow-sm transition-all flex items-center justify-center active:scale-95">
              <span class="text-blue-500 mr-2">${icons.sparkles}</span> 訪問の感想文を下書きする
            </button>
            ` : ''}
          </div>
          
          ${state.isGeminiLoading ? `
            <div class="mt-4 p-4 bg-gray-50 rounded-xl text-sm text-gray-500 flex flex-col items-center justify-center animate-pulse border border-gray-100">
              <span class="text-2xl mb-2 block animate-spin">✨</span>
              <p>Geminiが考えています...</p>
            </div>
          ` : state.geminiResult ? `
            <div class="mt-4 p-4 bg-gradient-to-br from-purple-50 to-blue-50 rounded-xl text-sm text-gray-800 leading-relaxed border border-purple-100 shadow-inner">
              <div class="flex items-center text-purple-800 font-bold mb-2 pb-2 border-b border-purple-200/50">
                <span class="mr-1">${icons.sparkles}</span> Geminiからのメッセージ
              </div>
              <p class="whitespace-pre-wrap">${state.geminiResult}</p>
            </div>
          ` : ''}
        </div>
      `;

      modalRoot.innerHTML = `
        <div class="fixed inset-0 z-40 flex items-end sm:items-center justify-center bg-black/60 backdrop-blur-sm p-0 sm:p-4 transition-opacity close-modal-bg">
          <div class="bg-white w-full sm:max-w-md rounded-t-3xl sm:rounded-3xl p-6 pb-10 sm:pb-6 shadow-2xl slide-in max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6 sm:hidden"></div>
            
            <div class="flex justify-between items-start mb-4">
              <div class="w-16 h-16 bg-green-100 text-green-700 rounded-full flex items-center justify-center text-3xl font-bold shadow-inner shrink-0">
                ${place.kana}
              </div>
              <button class="close-modal-btn p-2 bg-gray-100 rounded-full text-gray-400 hover:text-gray-600 hover:bg-gray-200 transition-colors ml-4 shrink-0">
                ${icons.x}
              </button>
            </div>
            
            <h3 class="text-xl sm:text-2xl font-bold text-gray-800 mb-4 leading-relaxed">
              ${place.text}
            </h3>
            
            <div class="bg-gray-50 rounded-xl p-3 mb-6 border border-gray-100">
              <p class="text-gray-600 font-medium flex items-center">
                <span class="text-blue-500 mr-2 shrink-0">${icons.mapPin}</span>
                <span class="break-words">${place.place}</span>
              </p>
            </div>
            
            <button class="toggle-visit-btn w-full py-4 rounded-2xl font-bold text-lg flex items-center justify-center transition-all active:scale-[0.98] ${btnClass}">
              ${isVisited 
                ? `<span class="mr-2">${icons.checkCircle}</span> 行った！（タップで取り消し）`
                : `<span class="mr-2">${icons.compass}</span> この場所に行った！`
              }
            </button>

            <!-- Gemini AI機能エリア -->
            ${geminiUI}
            
          </div>
        </div>
      `;
    }

    function triggerAnimation() {
      animationRoot.innerHTML = '';
      const emojis = ['🌟', '✨', '🎉', '🎊', '🎈', '👏'];
      for (let i = 0; i < 40; i++) {
        const el = document.createElement('div');
        el.className = 'absolute animate-celebration drop-shadow-lg';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = `${Math.random() * 100}vw`;
        el.style.bottom = '-50px';
        el.style.fontSize = `${Math.random() * 1.5 + 1}rem`;
        el.style.animationDuration = `${Math.random() * 2 + 1.5}s`;
        el.style.animationDelay = `${Math.random() * 0.5}s`;
        animationRoot.appendChild(el);
      }
      setTimeout(() => { animationRoot.innerHTML = ''; }, 4000);
    }

    // --- イベントリスナー設定 ---
    
    searchInput.addEventListener('input', (e) => {
      state.searchQuery = e.target.value;
      if (state.searchQuery) {
        clearSearchBtn.classList.remove('hidden');
      } else {
        clearSearchBtn.classList.add('hidden');
      }
      renderAll();
    });

    clearSearchBtn.addEventListener('click', () => {
      state.searchQuery = '';
      searchInput.value = '';
      clearSearchBtn.classList.add('hidden');
      renderAll();
    });

    document.body.addEventListener('click', (e) => {
      const placeBtn = e.target.closest('.place-btn');
      if (placeBtn) {
        const id = placeBtn.dataset.id;
        state.selectedPlace = placesData.find(p => p.id === id);
        state.geminiResult = null; // AI結果のリセット
        state.isGeminiLoading = false;
        renderModal();
        return;
      }

      const toggleBtn = e.target.closest('.toggle-visit-btn');
      if (toggleBtn && state.selectedPlace) {
        toggleVisit(state.selectedPlace.id);
        return;
      }

      // Gemini機能のボタンクリック処理
      const triviaBtn = e.target.closest('.ask-gemini-trivia');
      if (triviaBtn && state.selectedPlace) {
        askGemini("trivia", state.selectedPlace);
        return;
      }

      const diaryBtn = e.target.closest('.ask-gemini-diary');
      if (diaryBtn && state.selectedPlace) {
        askGemini("diary", state.selectedPlace);
        return;
      }

      const closeBtn = e.target.closest('.close-modal-btn');
      const closeBg = e.target.closest('.close-modal-bg');
      if (closeBtn || (closeBg && e.target === closeBg)) {
        state.selectedPlace = null;
        state.geminiResult = null; // AI結果のリセット
        state.isGeminiLoading = false;
        renderModal();
        return;
      }
    });

    // アプリケーション起動
    initFirebase();
    loadGoogleMaps();

  </script>
</body>

</html>
